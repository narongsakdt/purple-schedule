  header { background:linear-gradient(135deg,#5b2a9d,#8a4fd0); color:#fff;
           padding:22px 20px; text-align:center; }
  header h1 { margin:0; font-size:22px; letter-spacing:.3px; }
  header p { margin:6px 0 0; opacity:.85; font-size:13px; }
  main { max-width:820px; margin:24px auto; padding:0 16px; }
  #drop { display:block; border:2.5px dashed #b79ee0; border-radius:16px; background:#fff;

  #drop.hover { border-color:var(--purple); background:#faf7ff; }
  #drop strong { color:var(--purple); }
  #drop .sub { color:#7a7490; font-size:13px; margin-top:8px; }
  .privacy-note { margin:12px auto 0; max-width:680px; color:#5f5872;
    font-size:13px; line-height:1.45; text-align:center; }
  input[type=file] { display:none; }
  #status { margin:16px 0; font-size:14px; min-height:20px; }
  #status.err { color:#c0264d; }
  #status.ok { color:#1f8a4c; }
  .btn { display:block; margin:10px auto 0; padding:11px 20px; border:none;
         border-radius:10px; background:var(--purple); color:#fff; font-size:15px;
         cursor:pointer; }
  .btn:disabled { opacity:.4; cursor:default; }
  #preview { margin-top:20px; text-align:center; }
  #preview img { max-width:100%; border:1px solid #ddd; border-radius:8px;
                 box-shadow:0 4px 18px rgba(60,30,110,.12); }
  /* offscreen stage where the full-size schedule is rendered for capture */
  #stageWrap { position:absolute; left:-99999px; top:0; }
  #page, #page * {
    font-family:"SchedFont","Tahoma","Verdana",sans-serif !important;
    font-synthesis:none;
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }
  footer { text-align:center; color:#9a94ac; font-size:12px; margin:30px 0; }

  .upload-confirm-backdrop { position:fixed; inset:0; display:none; place-items:center;
    padding:20px; background:rgba(30,27,46,.45); z-index:9999; }
  .upload-confirm-backdrop.show { display:grid; }
  .upload-confirm-dialog { width:min(420px,100%); background:#fff;
    border:1px solid rgba(106,47,181,.18); border-radius:12px;
    box-shadow:0 18px 60px rgba(30,27,46,.28); padding:22px; text-align:center; }
  .upload-confirm-question { margin:0 0 18px; color:#1e1b2e; font-size:18px;
    font-weight:700; line-height:1.45; }
  .upload-confirm-dialog .btn { margin-top:0; min-width:180px; }

<script>
// ---- constants (ported from make_purple.py) ----
const BASE_WIDTH = 3451, SCALE = 2;

const $ = s => document.querySelector(s);
const statusEl = $("#status");
function setStatus(msg, cls) { statusEl.textContent = msg; statusEl.className = cls || ""; }

// ---- render HTML (port of render_html) ----
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function renderHTML(meta, days, dows, ndays) {
  const height = 481 + 126 * ndays;
  const title = `${meta.month}${meta.year}`;
  const rows = [];
  for (let d = 1; d <= ndays; d++) {
    const cls = (dows[d] === "Sat" || dows[d] === "Sun") ? "we" : "wk";
    const content = days[d].map(([t,c]) =>
      `<span style="color:${c}">${esc(t)}</span>`).join('<span class="g"></span>');
    rows.push(`<tr class="${cls}"><td class="num">${d}</td>`
      + `<td class="dow">${dows[d]}</td><td class="ent">${content}</td></tr>`);
  }
  const name = esc(meta.name).replace(" ", "&nbsp;&nbsp;");
  const html = `<div id="page" style="width:${BASE_WIDTH}px;height:${height}px">
    <div class="hdr" style="left:84px;top:40px">Staff No.</div>
    <div class="hdr" style="left:540px;top:40px">:</div>
    <div class="val" style="left:613px;top:40px">${esc(meta.staff)}</div>
    <div class="hdr" style="left:900px;top:40px">Name :</div>
    <div class="val" style="left:1245px;top:40px">${name}</div>
    <div class="hdr" style="left:84px;top:180px">Rank :</div>
    <div class="val" style="left:613px;top:180px">${esc(meta.rank)}</div>
    <div class="hdr" style="left:900px;top:180px">A/C :</div>
    <div class="val" style="left:1245px;top:180px">${esc(meta.ac)}</div>
    <table><tr><th colspan="2" style="width:349px">Date</th>
      <th style="width:3017px">${title}</th></tr>${rows.join("")}</table>
  </div>`;
  return { html, height, title };
}

const STAGE_CSS = `
  #page { position:relative; background:#fff; font-family:"SchedFont",Tahoma,Verdana,sans-serif; }
  #page .hdr { position:absolute; font:bold 80px "SchedFont",Arial,sans-serif; color:#000080; white-space:pre; }
  #page .val { position:absolute; font:80px "SchedFont",Arial,sans-serif; color:rgb(151,63,216); white-space:pre; }
  #page table { position:absolute; left:23px; top:320px; border-collapse:separate; border-spacing:6px; }
  #page th { background:#4B0082; color:#fff; font:bold 78px "SchedFont",Tahoma; height:116px; padding:0; }
  #page td { height:120px; padding:0; font-size:78px; }
  #page tr.wk td { background:#E6E6FA; }
  #page tr.we td { background:#FEF0F5; }
  #page td.num { width:168px; text-align:right; padding-right:44px; color:rgb(147,111,218); box-sizing:border-box; }
  #page td.dow { width:175px; text-align:center; color:rgb(147,111,218); }
  #page td.ent { width:3017px; padding-left:158px; box-sizing:border-box; }
  #page .g { display:inline-block; width:100px; }
`;
if (!document.getElementById("stagecss")) {
  const s = document.createElement("style"); s.id = "stagecss";
  s.textContent = STAGE_CSS; document.head.appendChild(s);
}

    HYD:"Asia/Kolkata",CCU:"Asia/Kolkata",GAY:"Asia/Kolkata",
    DAC:"Asia/Dhaka",KTM:"Asia/Kathmandu",CMB:"Asia/Colombo"};
  const UTC_OFFSETS = {"Asia/Bangkok":7,"Asia/Kuala_Lumpur":8,"Australia/Perth":8,
    "Asia/Shanghai":8,"Asia/Tokyo":9,"Asia/Seoul":9,"Asia/Karachi":5,
    "Europe/Paris":2,"Europe/Oslo":2,"Europe/Copenhagen":2,"Europe/Rome":2,
    "Europe/Brussels":2,"Europe/Vienna":2,
    "Europe/Berlin":2,"Europe/Zurich":2,"Europe/London":1,
    "Australia/Sydney":10,"Australia/Melbourne":10,
    "Asia/Singapore":8,"Asia/Jakarta":7,"Asia/Makassar":8,
    "Asia/Hong_Kong":8,"Asia/Taipei":8,"Asia/Manila":8,
    "Asia/Ho_Chi_Minh":7,"Asia/Phnom_Penh":7,"Asia/Vientiane":7,
    "Asia/Yangon":6.5,"Asia/Kolkata":5.5,"Asia/Dhaka":6,
    "Asia/Kathmandu":5.75,"Asia/Colombo":5.5};

  const fixedVtz = (tzid, off, name) => {
    const mins = Math.round(Math.abs(off) * 60);
    const o = (off >= 0 ? "+" : "-")
      + String(Math.floor(mins / 60)).padStart(2,"0")
      + String(mins % 60).padStart(2,"0");
    return `BEGIN:VTIMEZONE\nTZID:${tzid}\nBEGIN:STANDARD\nDTSTART:19700101T000000\nTZOFFSETFROM:${o}\nTZOFFSETTO:${o}\nTZNAME:${name}\nEND:STANDARD\nEND:VTIMEZONE`;
  };
  const cetVtz = tzid =>
    `BEGIN:VTIMEZONE\nTZID:${tzid}\nBEGIN:STANDARD\nDTSTART:19701025T030000\nTZOFFSETFROM:+0200\nTZOFFSETTO:+0100\nTZNAME:CET\nRRULE:FREQ=YEARLY;BYMONTH=10;BYDAY=-1SU\nEND:STANDARD\nBEGIN:DAYLIGHT\nDTSTART:19700329T020000\nTZOFFSETFROM:+0100\nTZOFFSETTO:+0200\nTZNAME:CEST\nRRULE:FREQ=YEARLY;BYMONTH=3;BYDAY=-1SU\nEND:DAYLIGHT\nEND:VTIMEZONE`;
  const ausVtz = tzid =>
    `BEGIN:VTIMEZONE\nTZID:${tzid}\nBEGIN:STANDARD\nDTSTART:19700405T030000\nTZOFFSETFROM:+1100\nTZOFFSETTO:+1000\nTZNAME:AEST\nRRULE:FREQ=YEARLY;BYMONTH=4;BYDAY=1SU\nEND:STANDARD\nBEGIN:DAYLIGHT\nDTSTART:19701004T020000\nTZOFFSETFROM:+1000\nTZOFFSETTO:+1100\nTZNAME:AEDT\nRRULE:FREQ=YEARLY;BYMONTH=10;BYDAY=1SU\nEND:DAYLIGHT\nEND:VTIMEZONE`;
  const VTZ = {
    "Asia/Bangkok":fixedVtz("Asia/Bangkok",7,"+07"),
    "Asia/Kuala_Lumpur":fixedVtz("Asia/Kuala_Lumpur",8,"+08"),
    "Australia/Perth":fixedVtz("Australia/Perth",8,"AWST"),
    "Asia/Shanghai":fixedVtz("Asia/Shanghai",8,"CST"),
    "Asia/Tokyo":fixedVtz("Asia/Tokyo",9,"JST"),
    "Asia/Seoul":fixedVtz("Asia/Seoul",9,"KST"),
    "Asia/Karachi":fixedVtz("Asia/Karachi",5,"PKT"),
    "Asia/Singapore":fixedVtz("Asia/Singapore",8,"+08"),
    "Asia/Jakarta":fixedVtz("Asia/Jakarta",7,"WIB"),
    "Asia/Makassar":fixedVtz("Asia/Makassar",8,"WITA"),
    "Europe/Paris":cetVtz("Europe/Paris"),
    "Europe/Oslo":cetVtz("Europe/Oslo"),
    "Europe/Copenhagen":cetVtz("Europe/Copenhagen"),
    "Europe/Berlin":cetVtz("Europe/Berlin"),
    "Europe/Zurich":cetVtz("Europe/Zurich"),
    "Europe/London":"BEGIN:VTIMEZONE\nTZID:Europe/London\nBEGIN:STANDARD\nDTSTART:19701025T020000\nTZOFFSETFROM:+0100\nTZOFFSETTO:+0000\nTZNAME:GMT\nRRULE:FREQ=YEARLY;BYMONTH=10;BYDAY=-1SU\nEND:STANDARD\nBEGIN:DAYLIGHT\nDTSTART:19700329T010000\nTZOFFSETFROM:+0000\nTZOFFSETTO:+0100\nTZNAME:BST\nRRULE:FREQ=YEARLY;BYMONTH=3;BYDAY=-1SU\nEND:DAYLIGHT\nEND:VTIMEZONE",
    "Australia/Sydney":ausVtz("Australia/Sydney"),
    "Australia/Melbourne":ausVtz("Australia/Melbourne"),
    "Europe/Rome":cetVtz("Europe/Rome"),
    "Europe/Brussels":cetVtz("Europe/Brussels"),
    "Europe/Vienna":cetVtz("Europe/Vienna"),
    "Asia/Hong_Kong":fixedVtz("Asia/Hong_Kong",8,"HKT"),
    "Asia/Taipei":fixedVtz("Asia/Taipei",8,"CST"),
    "Asia/Manila":fixedVtz("Asia/Manila",8,"PHT"),
    "Asia/Ho_Chi_Minh":fixedVtz("Asia/Ho_Chi_Minh",7,"+07"),
    "Asia/Phnom_Penh":fixedVtz("Asia/Phnom_Penh",7,"+07"),
    "Asia/Vientiane":fixedVtz("Asia/Vientiane",7,"+07"),
    "Asia/Yangon":fixedVtz("Asia/Yangon",6.5,"MMT"),
    "Asia/Kolkata":fixedVtz("Asia/Kolkata",5.5,"IST"),
    "Asia/Dhaka":fixedVtz("Asia/Dhaka",6,"BST"),
    "Asia/Kathmandu":fixedVtz("Asia/Kathmandu",5.75,"NPT"),
    "Asia/Colombo":fixedVtz("Asia/Colombo",5.5,"+0530"),
  };

  const pad = (n, w=2) => String(n).padStart(w, "0");
  const icsEsc = s => String(s).replace(/\\/g,"\\\\").replace(/;/g,"\\;")
    .replace(/,/g,"\\,").replace(/\n/g,"\\n");
  const fmt = dt => `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}${pad(dt.getSeconds())}`;
  const tzOf = stn => TZ[stn] || "Asia/Bangkok";
  const offOf = tz => UTC_OFFSETS[tz] != null ? UTC_OFFSETS[tz] : 7;
  const toUtcMs = (dt, tz) => dt.getTime() - offOf(tz)*3600000;
  const utcLabel = tz => {
    const o = offOf(tz), mins = Math.round(Math.abs(o) * 60);
    return "UTC" + (o < 0 ? "-" : "+") + Math.floor(mins / 60)
      + (mins % 60 ? ":" + String(mins % 60).padStart(2, "0") : "");
  };
  const blockStr = mins => `${Math.floor(mins/60)}h ${pad(mins%60)}m`;
  // deterministic UID (FNV-1a) so re-imports update in place, as in build_ics.py
  const uidOf = key => {
    let h1 = 0x811c9dc5, h2 = 0x1000193;
    for (let i = 0; i < key.length; i++) {
      h1 = Math.imul(h1 ^ key.charCodeAt(i), 0x01000193) >>> 0;
      h2 = Math.imul(h2 ^ key.charCodeAt(i), 0x85ebca6b) >>> 0;
    }
    return h1.toString(16).padStart(8,"0") + h2.toString(16).padStart(8,"0") + "@purpleschedule";
  };

  function buildICS(meta, days, legs, ndays, duty) {
  const monIdx = MONTH_NUM[meta.month];
  const year = meta.year;
  const now = new Date();
  const stamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;
  const tzsUsed = new Set();
  const events = [];
  let flightCount = 0;

  const addEvent = (summary, ds, tzs, de, tze, loc, desc, allDay) => {
    const lines = ["BEGIN:VEVENT",
      `UID:${uidOf(`purple|${summary}|${tzs||""}|${allDay ? fmt(ds).slice(0,8) : fmt(ds)}`)}`,
      `DTSTAMP:${stamp}`];
    if (allDay) {
      lines.push(`DTSTART;VALUE=DATE:${fmt(ds).slice(0,8)}`,
                 `DTEND;VALUE=DATE:${fmt(de).slice(0,8)}`);
    } else {
      tzsUsed.add(tzs); tzsUsed.add(tze);
      lines.push(`DTSTART;TZID=${tzs}:${fmt(ds)}`, `DTEND;TZID=${tze}:${fmt(de)}`);
    }
    lines.push(`SUMMARY:${icsEsc(summary)}`, `LOCATION:${icsEsc(loc)}`);
    if (desc) lines.push(`DESCRIPTION:${icsEsc(desc)}`);
    lines.push("END:VEVENT");
    events.push({ sort: ds.getTime(), lines });
  };

  const hm = t => [ +t.slice(0,2), +t.slice(2,4) ];

  // ---- normalize the day-column legs ----
  // The slip grid puts an overnight flight's departure in one day column
  // (dep only) and its arrival in the next (arr only); rejoin those. Legs
  // with a non-numeric id (CHMSB…, TRG…) are timed ground duties, not flights.
  const slots = [];
  for (let d = 1; d <= ndays; d++)
    for (const l of (legs[d] || [])) slots.push({ day: d, leg: l, used: false });
  const flights = [], groundDuties = [];
  for (const s of slots) {
    if (s.used) continue;
    const l = s.leg, id = String(l.id || "");
    if (/^\d{3,4}$/.test(id) && l.dep) {
      let dest = l.arr_stn, arr = l.arr, arrDay = s.day;
      if (!arr) {
        const cont = slots.find(x => !x.used && !x.leg.id && !x.leg.dep && x.leg.arr
          && x.day > s.day && x.day <= s.day + 2);
        if (cont) { arr = cont.leg.arr; arrDay = cont.day;
                    dest = cont.leg.arr_stn || dest; cont.used = true; }
      }
      if (arr) flights.push({ flt: "TG" + (+id), org: l.dep_stn, dep: l.dep,
                              depDay: s.day, dest, arr, arrDay,
                              firstOfDay: !flights.some(f => f.depDay === s.day) });
      s.used = true;
    } else if (id && l.dep && l.arr && !INDICATORS.has(id)) {
      // indicator letters (L/P/U/N/S/V/@/GT) are markers, never event codes
      groundDuties.push({ code: id, day: s.day, dep: l.dep, arr: l.arr });
      s.used = true;
    }
  }

  const dutyEmoji = code =>
    /^(VAC|VOFF|HOL)/.test(code) ? `\u{1F334} LEAVE (${code})` :
    code.startsWith("CHM")       ? `☎️ ${code}` : `\u{1F3E2} ${code}`;

  // resolve flight datetimes (arrival day is explicit after the rejoin)
  for (const f of flights) {
    const [dh, dm] = hm(f.dep), [ah, am] = hm(f.arr);
    f.dtz = tzOf(f.org); f.atz = tzOf(f.dest);
    f.dep_dt = new Date(year, monIdx, f.depDay, dh, dm);
    f.arr_dt = new Date(year, monIdx, f.arrDay, ah, am);
    if (toUtcMs(f.arr_dt, f.atz) <= toUtcMs(f.dep_dt, f.dtz))  // same-column overnight
      f.arr_dt = new Date(year, monIdx, f.arrDay + 1, ah, am);
  }
  flights.sort((a, b) => toUtcMs(a.dep_dt, a.dtz) - toUtcMs(b.dep_dt, b.dtz));

  flights.forEach((f, i) => {
    // check-in 2h before a BKK departure that starts the duty day
    if (f.org === "BKK" && f.firstOfDay) {
      const ci = new Date(f.dep_dt.getTime() - 2*3600000);
      addEvent(`❗ Check-in ${f.flt}`, ci, "Asia/Bangkok",
               new Date(ci.getTime() + 5*60000), "Asia/Bangkok", "BKK");
    }
    const mins = Math.round((toUtcMs(f.arr_dt, f.atz) - toUtcMs(f.dep_dt, f.dtz)) / 60000);
    const desc = `${f.org||""} ${utcLabel(f.dtz)} → ${f.dest||""} ${utcLabel(f.atz)}\nBlock Time: ${blockStr(mins)}`;
    addEvent(`\u{1F680} ${f.flt} ${f.org||""}→${f.dest||""}`, f.dep_dt, f.dtz,
             f.arr_dt, f.atz, `${f.org||""}→${f.dest||""}`, desc);
    flightCount++;
    // layover away from BKK, until the next flight's departure
    if (f.dest && f.dest !== "BKK") {
      const nxt = flights[i+1];
      const layEnd = nxt ? nxt.dep_dt : new Date(f.arr_dt.getTime() + 12*3600000);
      const gapMs = (nxt ? toUtcMs(nxt.dep_dt, nxt.dtz) : toUtcMs(layEnd, f.atz))
                  - toUtcMs(f.arr_dt, f.atz);
      // short same-day turnarounds are not layovers
      if (gapMs >= 6*3600000 && layEnd.getTime() > f.arr_dt.getTime())
        addEvent(`\u{1F6CF}️ Layover ${f.dest}`, f.arr_dt, f.atz, layEnd, f.atz,
                 f.dest, `Layover at ${f.dest}`);
    }
  });

  // timed ground duties from the grid (standby, training, …)
  for (const g of groundDuties) {
    const [sh, sm] = hm(g.dep), [eh, em] = hm(g.arr);
    addEvent(dutyEmoji(g.code), new Date(year, monIdx, g.day, sh, sm), "Asia/Bangkok",
             new Date(year, monIdx, g.day, eh, em), "Asia/Bangkok", "BKK");
  }

  // duty rows with no grid legs at all (leave, meetings, …)
  for (let d = 1; d <= ndays; d++) {
    if ((legs[d] || []).length) continue;
    const toks = ((duty && duty[d]) || []).filter(t => typeof t === "string");
    const times = toks.filter(t => /^\d{2}:\d{2}$/.test(t));
    const codes = toks.filter(t => !/^\d{2}:\d{2}$/.test(t) && !/^[-*]+$/.test(t)
      && t !== "OFF" && t !== "BKK" && !INDICATORS.has(t));
    if (!codes.length) continue;
    const summary = dutyEmoji(codes.join(" "));
    if (times.length >= 2) {
      const [sh, sm] = times[0].split(":"), [eh, em] = times[times.length-1].split(":");
      addEvent(summary, new Date(year, monIdx, d, +sh, +sm), "Asia/Bangkok",
               new Date(year, monIdx, d, +eh, +em), "Asia/Bangkok", "BKK");
    } else {
      addEvent(summary, new Date(year, monIdx, d), null,
               new Date(year, monIdx, d+1), null, "BKK", "", true);
    }
  }

  events.sort((a, b) => a.sort - b.sort);
  const calName = `${meta.name} - ${meta.month.slice(0,3)} ${year} Roster`;
  const vtimezones = [...tzsUsed].filter(t => VTZ[t]).sort()
    .map(t => VTZ[t]).join("\n");
  const parts = ["BEGIN:VCALENDAR","VERSION:2.0",
    "PRODID:-//Purple Schedule Maker//EN","CALSCALE:GREGORIAN",
    `X-WR-CALNAME:${calName}`,"METHOD:PUBLISH"];
  if (vtimezones) parts.push(vtimezones);
  for (const e of events) parts.push(e.lines.join("\n"));
  parts.push("END:VCALENDAR","");
  // count feeds the button label and disables it at 0 — never report 0
  // while the calendar still has (duty/leave) events
  return { ics: parts.join("\n").replace(/\r?\n/g, "\r\n"),
           count: flightCount || events.length };
}

// ---- upload confirmation dialog ----
const CONFIRM_QUESTION = "ข้าพเจ้าขอรับรองว่า ไม่เคยประพฤติไม่เหมาะสมต่อผู้สร้างระบบนี้ และขอตั้งสัจอธิษฐานว่าจะครองตนอย่างมีสติ ไม่เพี้ยน อยู่ในศีลธรรม เป็นคนดี มีเมตตา และประพฤติชอบตลอดปัย หากข้าพเจ้าละเมิดคำสัตย์นี้ ขอให้ผลแห่งกรรมและความไม่สุจริตนั้นย้อนคืนแก่ข้าพเจ้าโดยชอบธรรม";
const CONFIRM_BUTTON = "ใช่ ฉันยอมรับคั้บ";
let activeConfirm = null;
function askUploadConfirmation() {
  if (activeConfirm) return activeConfirm;
  let backdrop = document.querySelector("#uploadConfirmDialog");
  if (!backdrop) {
    backdrop = document.createElement("div");
    backdrop.id = "uploadConfirmDialog";
    backdrop.className = "upload-confirm-backdrop";
    backdrop.innerHTML = `
      <div class="upload-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="uploadConfirmQuestion">
        <p class="upload-confirm-question" id="uploadConfirmQuestion"></p>
        <button type="button" class="btn" id="uploadConfirmAccept"></button>
      </div>`;
    document.body.appendChild(backdrop);
    backdrop.querySelector("#uploadConfirmQuestion").textContent = CONFIRM_QUESTION;
    backdrop.querySelector("#uploadConfirmAccept").textContent = CONFIRM_BUTTON;
  }
  const button = backdrop.querySelector("#uploadConfirmAccept");
  backdrop.classList.add("show");
  button.focus({ preventScroll: true });
  activeConfirm = new Promise((resolve) => {
    button.addEventListener("click", () => {
      backdrop.classList.remove("show");
      activeConfirm = null;
      resolve();
    }, { once: true });
  });
  return activeConfirm;
}

// ---- pipeline ----
let currentDataURL = null, currentName = "purple_schedule.png";
let currentICS = null, currentICSName = "purple_schedule.ics";

async function handleFile(file) {
  if (!file) return;
  await askUploadConfirmation();
  $("#dl").disabled = true; $("#preview").innerHTML = ""; currentDataURL = null;
  setStatus("กำลังอ่านไฟล์ PDF…");
  try {
    const buf = await file.arrayBuffer();
    const { words, text } = await PurpleCore.extractWords(buf);
    setStatus("กำลังสร้างตาราง…");
    const { meta, duty, legs, dows, ndays } = PurpleCore.parse(words, text);
    const days = PurpleCore.composeDays(duty, legs, ndays);
    const { html, height } = renderHTML(meta, days, dows, ndays);

    const stage = $("#stage");
    stage.innerHTML = html;
    // make sure the embedded font is loaded before capture
    if (document.fonts && document.fonts.load) {
      await document.fonts.load('bold 80px "SchedFont"');
      await document.fonts.load('400 80px "SchedFont"');
      await document.fonts.ready;
    }
    // wait a frame so layout settles
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    const canvas = await html2canvas(stage.querySelector("#page"), {
      width: BASE_WIDTH, height, scale: SCALE, backgroundColor: "#ffffff",
      windowWidth: BASE_WIDTH, windowHeight: height
    });
    currentDataURL = canvas.toDataURL("image/png");
    currentName = `${meta.staff}_${meta.month}_${meta.year}.png`;

    const img = new Image(); img.src = currentDataURL;
    $("#preview").innerHTML = "";
    $("#preview").appendChild(img);
    $("#dl").disabled = false;

    const { ics, count } = buildICS(meta, days, legs, ndays, duty);
    currentICS = ics;
    currentICSName = `${meta.staff}_${meta.month}_${meta.year}.ics`;
    $("#ics").disabled = count === 0;
    $("#ics").textContent = `📅 ดาวน์โหลด ปฏิทิน (.ics) · ${count} เที่ยวบิน`;

    setStatus(`✓ ${meta.month}${meta.year} — ${meta.staff} ${meta.name} (${meta.rank})`, "ok");
  } catch (e) {
    console.error(e);
    setStatus("⚠︎ " + (e.message || e), "err");
  }
}

// ---- wiring ----
const drop = $("#drop"), fileInput = $("#file");
fileInput.addEventListener("change", e => handleFile(e.target.files[0]));
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add("hover"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove("hover"); }));
drop.addEventListener("drop", e => {
  const f = e.dataTransfer.files[0];
  if (f) { fileInput.value = ""; handleFile(f); }
});
$("#dl").addEventListener("click", () => {
  if (!currentDataURL) return;
  const a = document.createElement("a");
  a.href = currentDataURL; a.download = currentName; a.click();
});

const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent)
  || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

$("#ics").addEventListener("click", async () => {
  if (!currentICS) return;
  const blob = new Blob([currentICS], { type: "text/calendar;charset=utf-8" });

  // Try the native Share sheet first (works on many mobile browsers).
  const file = new File([blob], currentICSName, { type: "text/calendar" });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file] }); return; }
    catch (e) { if (e && e.name === "AbortError") return; /* else fall through */ }
  }

  // Otherwise download the .ics file. On iOS, tap the downloaded file
  // (Safari Downloads ⌄ icon → the .ics) to open "Add All to Calendar".
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = currentICSName; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});
