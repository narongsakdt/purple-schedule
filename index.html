<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Purple Schedule Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root { --purple:#6a2fb5; --navy:#000080; --indigo:#4B0082; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:#f4f1fa; color:#1e1b2e; }
  header { background:linear-gradient(135deg,#5b2a9d,#8a4fd0); color:#fff;
           padding:22px 20px; text-align:center; }
  header h1 { margin:0; font-size:22px; letter-spacing:.3px; }
  header p { margin:6px 0 0; opacity:.85; font-size:13px; }
  main { max-width:820px; margin:24px auto; padding:0 16px; }
  #drop { display:block; border:2.5px dashed #b79ee0; border-radius:16px; background:#fff;
          padding:44px 20px; text-align:center; cursor:pointer; transition:.15s; }
  #drop.hover { border-color:var(--purple); background:#faf7ff; }
  #drop strong { color:var(--purple); }
  #drop .sub { color:#7a7490; font-size:13px; margin-top:8px; }
  input[type=file] { display:none; }
  #status { margin:16px 0; font-size:14px; min-height:20px; }
  #status.err { color:#c0264d; }
  #status.ok { color:#1f8a4c; }
  .btn { display:inline-block; margin-top:10px; padding:11px 20px; border:none;
         border-radius:10px; background:var(--purple); color:#fff; font-size:15px;
         cursor:pointer; }
  .btn:disabled { opacity:.4; cursor:default; }
  #preview { margin-top:20px; text-align:center; }
  #preview img { max-width:100%; border:1px solid #ddd; border-radius:8px;
                 box-shadow:0 4px 18px rgba(60,30,110,.12); }
  /* offscreen stage where the full-size schedule is rendered for capture */
  #stageWrap { position:absolute; left:-99999px; top:0; }
  footer { text-align:center; color:#9a94ac; font-size:12px; margin:30px 0; }
</style>
</head>
<body>
<header>
  <h1>💜 Purple Schedule Maker</h1>
  <p>Crew Schedule Slip PDF → purple-schedule PNG · runs entirely in your browser</p>
</header>
<main>
  <label id="drop" for="file">
    <div>Drop your <strong>Crew Schedule Slip PDF</strong> here</div>
    <div class="sub">or tap to choose a file · nothing is uploaded, everything stays on your device</div>
    <input type="file" id="file" accept="application/pdf">
  </label>
  <div id="status"></div>
  <button id="dl" class="btn" disabled>⬇︎ Download PNG</button>
  <div id="preview"></div>
</main>
<footer>All processing happens locally — your PDF never leaves this device.</footer>

<div id="stageWrap"><div id="stage"></div></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

// ---- constants (ported from make_purple.py) ----
const NAVY = "#000080", INDIGO = "#4B0082";
const MONTHS = {};
["January","February","March","April","May","June","July","August",
 "September","October","November","December"].forEach(m => MONTHS[m.slice(0,3)] = m);
const INDICATORS = new Set(["L","P","U","N","S","V","@","GT"]);
const TIME_RE = /^\d{2}:\d{2}$/;
const BASE_WIDTH = 3451, SCALE = 2;

const $ = s => document.querySelector(s);
const statusEl = $("#status");
function setStatus(msg, cls) { statusEl.textContent = msg; statusEl.className = cls || ""; }

// ---- PDF -> words[{text,x0,x1,top}] + full text ----
async function extractWords(arrayBuffer) {
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdf.getPage(1);
  const vp = page.getViewport({ scale: 1 });
  const content = await page.getTextContent();
  const words = [];
  for (const it of content.items) {
    const str = it.str;
    if (!str || !str.trim()) continue;
    const x = it.transform[4];
    const top = vp.height - it.transform[5];   // distance from top, in PDF points
    const charW = it.width / Math.max(str.length, 1);
    // split each run into whitespace-separated tokens, positioning by char width
    let idx = 0;
    for (const part of str.split(/(\s+)/)) {
      if (part.trim()) {
        const x0 = x + idx * charW;
        words.push({ text: part, x0, x1: x0 + part.length * charW, top });
      }
      idx += part.length;
    }
  }
  // reconstruct page text: cluster words into lines with a y-tolerance
  // (mirrors pdfplumber's line grouping) then sort each line left-to-right
  const sorted = [...words].sort((a,b)=> a.top - b.top || a.x0 - b.x0);
  const lines = []; let cur = null;
  for (const w of sorted) {
    if (!cur || Math.abs(w.top - cur.top) > 3) {
      cur = { top: w.top, ws: [w] }; lines.push(cur);
    } else cur.ws.push(w);
  }
  const text = lines
    .map(l => l.ws.sort((a,b)=>a.x0-b.x0).map(w=>w.text).join(" "))
    .join("\n") + "\n";
  return { words, text };
}

// ---- parse (port of parse_pdf) ----
function parse(words, text) {
  const meta = {};
  let m = text.match(/PERS\.NO:\s*(\d+)\s+(\S+)\s+([A-Z ]+?)\s*\n/);
  if (!m) throw new Error("Could not find PERS.NO / name line — is this the right PDF?");
  meta.staff = m[1]; meta.category = m[2]; meta.name = m[3].trim();
  m = text.match(/A\/C QUAL:\s*([\d ]+?)\s*RANK:\s*(\S+)/);
  if (!m) throw new Error("Could not find A/C QUAL / RANK line.");
  meta.ac = m[1].trim().split(/\s+/).join(",");
  meta.rank = m[2];
  m = text.match(/EFFECTIVE:\s*\d{2}([A-Za-z]{3})(\d{2})/);
  if (!m) throw new Error("Could not find EFFECTIVE date.");
  const mon = m[1][0].toUpperCase() + m[1].slice(1).toLowerCase();
  meta.month = MONTHS[mon]; meta.year = 2000 + parseInt(m[2], 10);

  const title = t => t.length ? t[0].toUpperCase() + t.slice(1).toLowerCase() : t;

  const hdr = words.filter(w => /^\d{1,2}(MON|TUE|WED|THU|FRI|SAT|SUN)$/.test(w.text))
                   .sort((a,b)=>a.x0-b.x0);
  if (!hdr.length) throw new Error("Could not find the day header row (1MON…31…).");
  const centers = [], dows = {};
  for (const w of hdr) {
    const d = parseInt(w.text.match(/^\d+/)[0], 10);
    dows[d] = title(w.text.slice(String(d).length));
    centers.push([d, (w.x0 + w.x1) / 2]);
  }
  const bounds = [];
  centers.forEach(([d,c], i) => {
    const lo = i ? (centers[i-1][1] + c)/2 : c - 9;
    const hi = i+1 < centers.length ? (centers[i+1][1] + c)/2 : c + 9;
    bounds.push([d, lo, hi]);
  });
  const colOf = w => {
    const x = (w.x0 + w.x1)/2;
    for (const [d,lo,hi] of bounds) if (lo <= x && x < hi) return d;
    return null;
  };

  const hdrY = hdr[0].top;
  const dutyY = Math.min(...words.filter(w=>w.text==="DUTY"&&w.x0<120).map(w=>w.top));
  const fltYs = words.filter(w=>w.text==="FLT"&&w.x0<120).map(w=>w.top).sort((a,b)=>a-b);
  if (!fltYs.length) throw new Error("Could not find FLT rows.");
  const gridEnd = fltYs.length>1 ? fltYs[fltYs.length-1]+(fltYs[1]-fltYs[0])
                                 : fltYs[fltYs.length-1]+54;

  // DUTY row tokens per day
  const duty = {};
  for (const w of words) {
    if (dutyY-6 <= w.top && w.top < fltYs[0]-6 && w.x0 > 105 && w.top > hdrY+4) {
      const d = colOf(w);
      if (d) (duty[d] = duty[d] || []).push([w.top, w.x0, w.text]);
    }
  }
  for (const d in duty)
    duty[d] = duty[d].sort((a,b)=>a[0]-b[0]||a[1]-b[1]).map(t=>t[2]);

  // FLT/DEP/ARR -> legs per day
  const legs = {};
  fltYs.forEach((fy, bi) => {
    const ey = bi+1 < fltYs.length ? fltYs[bi+1] : gridEnd;
    const cells = {};
    for (const w of words) {
      if (fy-6 <= w.top && w.top < ey-6 && w.x0 > 105) {
        const d = colOf(w);
        if (d) (cells[d] = cells[d] || []).push([w.top, w.text]);
      }
    }
    for (const d in cells) {
      const items = cells[d].sort((a,b)=>a[0]-b[0]);
      const leg = {id:null, dep_stn:null, dep:null, arr_stn:null, arr:null};
      const mid = fy + 27;
      for (const [y,t] of items) {
        if (TIME_RE.test(t)) {
          const side = y < mid ? "dep" : "arr";
          leg[side] = leg[side] || t.replace(":","");
        } else if (leg.id === null && y < fy + 4) {
          leg.id = t;
        } else {
          const side = y < mid ? "dep_stn" : "arr_stn";
          leg[side] = leg[side] || t;
        }
      }
      if (leg.id || leg.dep || leg.arr) (legs[d] = legs[d] || []).push(leg);
    }
  });
  return { meta, duty, legs, dows, ndays: hdr.length };
}

// ---- compose (port of compose_days) ----
function composeDays(duty, legs, ndays) {
  const pad4 = n => String(n).padStart(4, "0");
  const legById = (d, fid) => (legs[d]||[]).find(l => l.id === fid) || null;
  const days = {};
  for (let d = 1; d <= ndays; d++) {
    const toks = (duty[d]||[]).filter(t =>
      !TIME_RE.test(t) && !([...t].every(c => c === "*")));
    const out = []; let lastLeg = null, ground = false, ind = "";
    for (const t of toks) {
      if (INDICATORS.has(t)) { ind = t + " "; continue; }
      if (/^\d{3,4}$/.test(t)) {
        const leg = legById(d, t);
        if (leg && leg.dep_stn === "BKK" && leg.dep)
          out.push([`${ind}${pad4(t)}(${leg.dep})`, NAVY]);
        else
          out.push([`${ind}${pad4(t)}`, NAVY]);
        lastLeg = leg;
      } else if (legById(d, t)) {
        const leg = legById(d, t);
        out.push([`${ind}${t}(${leg.dep}-${leg.arr})`, NAVY]);
        ground = true;
      } else if (t === "BKK") {
        if (ground && lastLeg === null) { ind = ""; continue; }
        let arr = null;
        if (lastLeg && lastLeg.arr_stn === "BKK") arr = lastLeg.arr;
        else {
          for (let pd = d; pd > Math.max(0, d-3); pd--) {
            for (const leg of (legs[pd]||[]))
              if (leg.arr_stn === "BKK" && leg.arr) { arr = leg.arr; break; }
            if (arr) break;
          }
        }
        out.push([arr ? `${ind}BKK(${arr})` : `${ind}BKK`, INDIGO]);
      } else {
        out.push([`${ind}${t}`, INDIGO]);
      }
      ind = "";
    }
    days[d] = out;
  }
  return days;
}

// ---- render HTML (port of render_html) ----
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function renderHTML(meta, days, dows, ndays) {
  const height = 481 + 126 * ndays;
  const title = `${meta.month}${meta.year}`;
  const rows = [];
  for (let d = 1; d <= ndays; d++) {
    const cls = (dows[d] === "Sat" || dows[d] === "Sun") ? "we" : "wk";
    const content = days[d].map(([t,c]) =>
      `<span style="color:${c}">${esc(t)}</span>`).join('<span class="g"></span>');
    rows.push(`<tr class="${cls}"><td class="num">${d}</td>`
      + `<td class="dow">${dows[d]}</td><td class="ent">${content}</td></tr>`);
  }
  const name = esc(meta.name).replace(" ", "&nbsp;&nbsp;");
  const html = `<div id="page" style="width:${BASE_WIDTH}px;height:${height}px">
    <div class="hdr" style="left:84px;top:40px">Staff No.</div>
    <div class="hdr" style="left:540px;top:40px">:</div>
    <div class="val" style="left:613px;top:40px">${esc(meta.staff)}</div>
    <div class="hdr" style="left:900px;top:40px">Name :</div>
    <div class="val" style="left:1245px;top:40px">${name}</div>
    <div class="hdr" style="left:84px;top:180px">Rank :</div>
    <div class="val" style="left:613px;top:180px">${esc(meta.rank)}</div>
    <div class="hdr" style="left:900px;top:180px">A/C :</div>
    <div class="val" style="left:1245px;top:180px">${esc(meta.ac)}</div>
    <table><tr><th colspan="2" style="width:349px">Date</th>
      <th style="width:3017px">${title}</th></tr>${rows.join("")}</table>
  </div>`;
  return { html, height, title };
}

const STAGE_CSS = `
  #page { position:relative; background:#fff; font-family:Tahoma,Verdana,sans-serif; }
  #page .hdr { position:absolute; font:bold 80px Arial,Helvetica,sans-serif; color:#000080; white-space:pre; }
  #page .val { position:absolute; font:80px Arial,Helvetica,sans-serif; color:rgb(151,63,216); white-space:pre; }
  #page table { position:absolute; left:23px; top:320px; border-collapse:separate; border-spacing:6px; }
  #page th { background:#4B0082; color:#fff; font:bold 78px Tahoma; height:116px; padding:0; }
  #page td { height:120px; padding:0; font-size:78px; }
  #page tr.wk td { background:#E6E6FA; }
  #page tr.we td { background:#FEF0F5; }
  #page td.num { width:168px; text-align:right; padding-right:44px; color:rgb(147,111,218); box-sizing:border-box; }
  #page td.dow { width:175px; text-align:center; color:rgb(147,111,218); }
  #page td.ent { width:3017px; padding-left:158px; box-sizing:border-box; }
  #page .g { display:inline-block; width:100px; }
`;
if (!document.getElementById("stagecss")) {
  const s = document.createElement("style"); s.id = "stagecss";
  s.textContent = STAGE_CSS; document.head.appendChild(s);
}

// ---- pipeline ----
let currentDataURL = null, currentName = "purple_schedule.png";

async function handleFile(file) {
  if (!file) return;
  $("#dl").disabled = true; $("#preview").innerHTML = ""; currentDataURL = null;
  setStatus("Reading PDF…");
  try {
    const buf = await file.arrayBuffer();
    const { words, text } = await extractWords(buf);
    setStatus("Building schedule…");
    const { meta, duty, legs, dows, ndays } = parse(words, text);
    const days = composeDays(duty, legs, ndays);
    const { html, height } = renderHTML(meta, days, dows, ndays);

    const stage = $("#stage");
    stage.innerHTML = html;
    // wait a frame so layout settles
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    const canvas = await html2canvas(stage.querySelector("#page"), {
      width: BASE_WIDTH, height, scale: SCALE, backgroundColor: "#ffffff",
      windowWidth: BASE_WIDTH, windowHeight: height
    });
    currentDataURL = canvas.toDataURL("image/png");
    currentName = `${meta.staff}_${meta.month}_${meta.year}.png`;

    const img = new Image(); img.src = currentDataURL;
    $("#preview").innerHTML = "";
    $("#preview").appendChild(img);
    $("#dl").disabled = false;
    setStatus(`✓ ${meta.month}${meta.year} — ${meta.staff} ${meta.name} (${meta.rank})`, "ok");
  } catch (e) {
    console.error(e);
    setStatus("⚠︎ " + (e.message || e), "err");
  }
}

// ---- wiring ----
const drop = $("#drop"), fileInput = $("#file");
fileInput.addEventListener("change", e => handleFile(e.target.files[0]));
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add("hover"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove("hover"); }));
drop.addEventListener("drop", e => {
  const f = e.dataTransfer.files[0];
  if (f) { fileInput.value = ""; handleFile(f); }
});
$("#dl").addEventListener("click", () => {
  if (!currentDataURL) return;
  const a = document.createElement("a");
  a.href = currentDataURL; a.download = currentName; a.click();
});
</script>
</body>
</html>
